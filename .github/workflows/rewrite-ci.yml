name: rewrite-ci

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 19 * * *"

env:
  MERGIFY_QUEUE_METADATA_EDIT: ${{ github.event_name == 'pull_request' && github.event.action == 'edited' && startsWith(github.event.pull_request.head.ref, 'mergify/merge-queue/') }}

# Cancel superseded ordinary PR runs (e.g. after a force-push). Never cancel
# main/nightly runs or Mergify queue verification PR runs — Mergify
# can otherwise observe the cancelled run before the replacement run finishes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'mergify/merge-queue/') }}

jobs:
  metadata-source-proof:
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    permissions:
      statuses: read
    runs-on: ubuntu-latest
    outputs:
      reuse_source: ${{ steps.proof.outputs.reuse_source }}
    steps:
      - name: Resolve same-head-SHA source validation proof
        id: proof
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            if (process.env.MERGIFY_QUEUE_METADATA_EDIT !== 'true') {
              core.setOutput('reuse_source', 'false');
              return;
            }
            try {
              const { owner, repo } = context.repo;
              const { data: statuses } = await github.rest.repos.listCommitStatusesForRef({
                owner,
                repo,
                ref: process.env.HEAD_SHA,
                per_page: 100
              });
              const latestProof = statuses.find((status) => status.context === 'rewrite-ci/source-validation');
              const reusable = latestProof?.state === 'success';
              core.info(reusable
                ? `Found successful source validation for ${process.env.HEAD_SHA}.`
                : `No successful source validation found for ${process.env.HEAD_SHA}; running full PR gates.`);
              core.setOutput('reuse_source', String(reusable));
            } catch (error) {
              core.warning(`Source validation proof lookup failed closed: ${error.message}`);
              core.setOutput('reuse_source', 'false');
            }

  pr-body-lint:
    if: github.event_name == 'pull_request'
    timeout-minutes: 15
    needs: metadata-source-proof
    runs-on: ubuntu-latest
    steps:
      - name: Reuse same-SHA source validation
        if: ${{ needs.metadata-source-proof.outputs.reuse_source == 'true' }}
        run: echo "Reusing successful source validation for the same head SHA."
      - uses: actions/checkout@v4
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        with:
          node-version: 24
      - name: Run PR body manifest gates
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        env:
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref || '' }}
          PR_AUTHOR_LOGIN: ${{ github.event.pull_request.user.login || '' }}
        run: node tools/run-manifest-gates.mjs --workflow-job pr-body-lint --exclude mergify-queue-metadata-edit-noop

  enforcement-debt-sunset:
    if: github.event_name != 'pull_request' && github.event_name == 'schedule'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run harness:check-enforcement-debt-sunset

  typecheck:
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'push')
    timeout-minutes: 15
    needs: metadata-source-proof
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24]
    steps:
      - name: Reuse same-SHA source validation
        if: ${{ needs.metadata-source-proof.outputs.reuse_source == 'true' }}
        run: echo "Reusing successful source validation for the same head SHA."
      - uses: actions/checkout@v4
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        run: npm ci
      - if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        run: node tools/run-manifest-gates.mjs --workflow-job typecheck --exclude mergify-queue-metadata-edit-noop

  fast-contract:
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'push')
    timeout-minutes: 15
    needs: metadata-source-proof
    runs-on: ubuntu-latest
    steps:
      - name: Reuse same-SHA source validation
        if: ${{ needs.metadata-source-proof.outputs.reuse_source == 'true' }}
        run: echo "Reusing successful source validation for the same head SHA."
      - uses: actions/checkout@v4
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        with:
          node-version: 24
          cache: npm
      - if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        run: npm ci
      - if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        run: node tools/run-manifest-gates.mjs --workflow-job fast-contract --exclude mergify-queue-metadata-edit-noop

  integration-shard:
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'push')
    timeout-minutes: 15
    needs: metadata-source-proof
    name: integration-shard (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
    steps:
      - name: Reuse same-SHA source validation
        if: ${{ needs.metadata-source-proof.outputs.reuse_source == 'true' }}
        run: echo "Reusing successful source validation for the same head SHA."
      - uses: actions/checkout@v4
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        with:
          node-version: 24
          cache: npm
      - if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        run: npm ci
      - if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        run: node tools/run-manifest-gates.mjs --workflow-job integration-shard --shard ${{ matrix.shard }} --exclude mergify-queue-metadata-edit-noop

  boundaries:
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'push')
    timeout-minutes: 15
    needs: metadata-source-proof
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Reuse same-SHA source validation
        if: ${{ needs.metadata-source-proof.outputs.reuse_source == 'true' }}
        run: echo "Reusing successful source validation for the same head SHA."
      - uses: actions/checkout@v4
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        with:
          node-version: 24
          cache: npm
      - if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        run: npm ci
      - if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node tools/run-manifest-gates.mjs --workflow-job boundaries --exclude mergify-queue-metadata-edit-noop

  package-policy:
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'push')
    timeout-minutes: 15
    needs: metadata-source-proof
    runs-on: ubuntu-latest
    steps:
      - name: Reuse same-SHA source validation
        if: ${{ needs.metadata-source-proof.outputs.reuse_source == 'true' }}
        run: echo "Reusing successful source validation for the same head SHA."
      - uses: actions/checkout@v4
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        with:
          node-version: 24
          cache: npm
      - if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        run: npm ci
      - if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        run: node tools/run-manifest-gates.mjs --workflow-job package-policy --exclude mergify-queue-metadata-edit-noop

  supply-chain:
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'push')
    timeout-minutes: 15
    needs: metadata-source-proof
    runs-on: ubuntu-latest
    steps:
      - name: Reuse same-SHA source validation
        if: ${{ needs.metadata-source-proof.outputs.reuse_source == 'true' }}
        run: echo "Reusing successful source validation for the same head SHA."
      - uses: actions/checkout@v4
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        with:
          node-version: 24
          cache: npm
      - if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        run: npm ci
      - if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        run: node tools/run-manifest-gates.mjs --workflow-job supply-chain --exclude mergify-queue-metadata-edit-noop

  # Governance authority: dec_01KY2PJRGWXEJDH3E622553HZK CH3 and
  # task_01KY36N9FN7XQ06TM49HHBYZFF. This advisory PR job intentionally is
  # not added to branch protection until the separately governed required-check step.
  direct-recovery:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node tools/run-manifest-gates.mjs --workflow-job direct-recovery

  gui-build:
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'push')
    timeout-minutes: 15
    needs: metadata-source-proof
    runs-on: ubuntu-latest
    steps:
      - name: Reuse same-SHA source validation
        if: ${{ needs.metadata-source-proof.outputs.reuse_source == 'true' }}
        run: echo "Reusing successful source validation for the same head SHA."
      - uses: actions/checkout@v4
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' && github.event_name == 'pull_request' }}
        id: filter
        with:
          # Force git-based comparison so Mergify merge-queue draft PRs use the
          # event's explicit base/head SHAs instead of the synthetic PR file list.
          token: ""
          base: ${{ github.event.pull_request.base.sha }}
          filters: |
            gui:
              - 'packages/gui/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
      - uses: actions/setup-node@v4
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' && (github.event_name == 'push' || steps.filter.outputs.gui == 'true') }}
        with:
          node-version: 24
          cache: npm
      # Skip the GUI build/test when a PR touches no GUI or shared-root files.
      - if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' && (github.event_name == 'push' || steps.filter.outputs.gui == 'true') }}
        run: npm ci
      - if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' && (github.event_name == 'push' || steps.filter.outputs.gui == 'true') }}
        run: node tools/run-manifest-gates.mjs --workflow-job gui-build --exclude mergify-queue-metadata-edit-noop

  windows-local-check:
    if: github.event_name == 'pull_request'
    timeout-minutes: 30
    needs: metadata-source-proof
    runs-on: windows-latest
    steps:
      - name: Reuse same-SHA source validation
        if: ${{ needs.metadata-source-proof.outputs.reuse_source == 'true' }}
        run: echo "Reusing successful source validation for the same head SHA."
      - uses: actions/checkout@v4
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        with:
          node-version: 24
          cache: npm
      - if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        run: npm ci
      - if: ${{ needs.metadata-source-proof.outputs.reuse_source != 'true' }}
        run: npm run check:local
        env:
          # Exercise the native developer stop-point instead of letting the
          # runner's ambient CI=true upgrade this smoke into check:ci.
          CI: "false"

  source-validation-proof:
    if: github.event_name == 'pull_request' && needs.metadata-source-proof.outputs.reuse_source != 'true'
    timeout-minutes: 5
    needs:
      - metadata-source-proof
      - pr-body-lint
      - typecheck
      - fast-contract
      - integration-shard
      - boundaries
      - package-policy
      - supply-chain
      - gui-build
      - windows-local-check
    permissions:
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - name: Record successful source validation on the exact head SHA
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            try {
              const { owner, repo } = context.repo;
              await github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha: process.env.HEAD_SHA,
                state: 'success',
                context: 'rewrite-ci/source-validation',
                description: 'All rewrite-ci source validation lanes passed',
                target_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`
              });
            } catch (error) {
              core.warning(`Could not persist reusable source proof; future metadata edits will run full gates: ${error.message}`);
            }
